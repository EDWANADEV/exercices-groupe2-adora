<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <h1>Rinse your eyes</h1>

      <div id="slides">
        <div class="slider active">
          <img src="/Image slider/Image/img1.jpg" alt="" />
        </div>
        <div class="slider">
          <img src="/Image slider/Image/img2.jpg" alt="" />
        </div>
        <div class="slider">
          <img src="/Image slider/Image/img3.jpg" alt="" />
        </div>
        <div class="slider">
          <img src="/Image slider/Image/img4.jpg" alt="" />
        </div>
        <div class="slider">
          <img src="/Image slider/Image/img5.jpg" alt="" />
        </div>
        <div class="slider">
          <img src="/Image slider/Image/img6.jpg" alt="" />
        </div>
        <div class="slider">
          <img src="/Image slider/Image/img7.jpg" alt="" />
        </div>
        <div class="slider">
          <img src="/Image slider/Image/img8.jpg" alt="" />
        </div>
        <div class="slider">
          <img src="/Image slider/Image/img9.jpg" alt="" />
        </div>
        <div class="slider">
          <img src="/Image slider//Image/img10.jpg" alt="" />
        </div>
      </div>
      <div class="dots" id="dots"></div>

      <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
      <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
